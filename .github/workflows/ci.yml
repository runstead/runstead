name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runstead
          POSTGRES_PASSWORD: runstead
          POSTGRES_DB: runstead
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U runstead -d runstead"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      DO_NOT_TRACK: "1"
      RUNSTEAD_PG_TEST_URL: postgres://runstead:runstead@127.0.0.1:5432/runstead
      TURBO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.1.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Fast tests
        run: pnpm run test:fast

      - name: Integration tests
        run: pnpm run test:integration

      - name: Build
        run: pnpm run build

      - name: Package smoke
        run: |
          pnpm --filter @runstead/core pack --dry-run
          pnpm --filter @runstead/domain-packs pack --dry-run
          pnpm --filter @runstead/evidence pack --dry-run
          pnpm --filter @runstead/governance pack --dry-run
          pnpm --filter @runstead/skills pack --dry-run
          pnpm --filter @runstead/runtime pack --dry-run
          pnpm --filter @runstead/sdk pack --dry-run
          pnpm --filter @runstead/state-postgres pack --dry-run
          pnpm --filter @runstead/state-sqlite pack --dry-run
          pnpm --filter @runstead/tools pack --dry-run
          pnpm --filter @runstead/verifiers pack --dry-run
          pnpm --filter @runstead/workers pack --dry-run
          pnpm --filter @runstead/cli pack --dry-run

      - name: CLI smoke
        run: |
          node packages/cli/dist/index.js --version
          node packages/cli/dist/index.js --help
          node packages/cli/dist/index.js startup --help
          node packages/cli/dist/index.js startup build-mvp --help
          node packages/cli/dist/index.js startup complete-check --help
          node packages/cli/dist/index.js startup source --help
          node packages/cli/dist/index.js startup source plan --cwd . --target production --format json
          node packages/cli/dist/index.js agent run --help
          node packages/cli/dist/index.js team control-plane runner --help
          node packages/cli/dist/index.js team control-plane runner heartbeat --help

      - name: Team control-plane live smoke
        env:
          RUNSTEAD_RUNTIME_BACKEND: postgres
          RUNSTEAD_POSTGRES_URL: ${{ env.RUNSTEAD_PG_TEST_URL }}
          RUNSTEAD_ARTIFACT_BASE_URI: file:///tmp/runstead-team-ci-artifacts
          RUNSTEAD_TEAM_ORG_ID: org_ci
          RUNSTEAD_TEAM_WORKSPACE_ID: workspace_ci
          RUNSTEAD_RUNNER_ID: runner_ci
          RUNSTEAD_AUDIT_SINK_URI: file:///tmp/runstead-team-ci-audit
          RUNSTEAD_REQUIRE_RUNNER_HEARTBEAT: "true"
        run: |
          TEAM_SMOKE_DIR="$(mktemp -d)"
          TEAM_SCHEMA="runstead_ci_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          TEAM_SCHEMA="${TEAM_SCHEMA//[^A-Za-z0-9_]/_}"

          node packages/cli/dist/index.js init --cwd "$TEAM_SMOKE_DIR" --profile trusted-local
          node packages/cli/dist/index.js team control-plane runner heartbeat \
            --cwd "$TEAM_SMOKE_DIR" \
            --schema "$TEAM_SCHEMA" \
            --runner-id "$RUNSTEAD_RUNNER_ID" \
            --organization-id "$RUNSTEAD_TEAM_ORG_ID" \
            --workspace-id "$RUNSTEAD_TEAM_WORKSPACE_ID" \
            --labels ci,runstead \
            --migrate \
            --json > "$TEAM_SMOKE_DIR/heartbeat.json"
          node packages/cli/dist/index.js team control-plane runner list \
            --cwd "$TEAM_SMOKE_DIR" \
            --schema "$TEAM_SCHEMA" \
            --organization-id "$RUNSTEAD_TEAM_ORG_ID" \
            --workspace-id "$RUNSTEAD_TEAM_WORKSPACE_ID" \
            --json > "$TEAM_SMOKE_DIR/runners.json"
          node packages/cli/dist/index.js team control-plane check \
            --cwd "$TEAM_SMOKE_DIR" \
            --schema "$TEAM_SCHEMA" \
            --live \
            --json > "$TEAM_SMOKE_DIR/team-check.json"
          node -e 'const fs=require("node:fs"); const result=JSON.parse(fs.readFileSync(process.argv[1], "utf8")); if (!result.passed || result.liveBackend?.connected !== true || result.liveBackend?.freshRunnerHeartbeats < 1) { console.error(JSON.stringify(result, null, 2)); process.exit(1); }' "$TEAM_SMOKE_DIR/team-check.json"
          node packages/cli/dist/index.js startup ready \
            --cwd "$TEAM_SMOKE_DIR" \
            --stage launch \
            --target local \
            --plan \
            --live-runtime-backend \
            --migrate-runtime-backend \
            --runtime-backend-schema "$TEAM_SCHEMA" > "$TEAM_SMOKE_DIR/startup-ready-plan.txt"
          grep -F "Runtime backend: postgres ready" "$TEAM_SMOKE_DIR/startup-ready-plan.txt"
          grep -F "live=connected runners=1 fresh=1" "$TEAM_SMOKE_DIR/startup-ready-plan.txt"
