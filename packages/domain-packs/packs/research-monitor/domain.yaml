id: research-monitor
schema_version: 1
version: 0.1.0
name: Research Monitor
description: Track sources over time and produce cited research digests.

compatibility:
  runstead_min_version: 0.0.0

scope:
  resource_types:
    - topic
    - source
    - source_assessment
    - citation
    - claim
    - digest
    - archive_record

goal_templates:
  - weekly-research-digest

task_types:
  - discover_sources
  - scan_sources
  - evaluate_source_reliability
  - summarize_findings
  - triage_source_conflicts
  - prepare_digest_release
  - archive_research_memory

default_policy: policies/research-monitor.yaml

default_verifiers:
  - source_discovery
  - citation_check
  - source_freshness
  - source_reliability
  - contradiction_check
  - digest_release_gate

required_tools:
  - filesystem
  - network_read

supported_workers:
  - shell
  - codex_cli
  - codex_direct

capability_policy:
  reads:
    - web.source
    - pdf.source
    - search_result
    - docs.workspace
  writes:
    - digest_draft
    - citation_ledger
    - archive_record
  approvals_required:
    - external_publish
    - distribution_write
    - protected_archive_write
  denied:
    - secret_read
    - external_send_without_approval
    - uncited_claim_publish

evidence_contracts:
  - workflow: weekly-research-digest
    outputs:
      - source_inventory
      - source_reliability_assessment
      - citation_ledger
      - contradiction_review
      - digest_draft
      - publish_approval
      - archive_record
    completion_criteria:
      - sources_fresh
      - claims_cited
      - contradictions_reviewed
      - publish_gate_recorded
      - archive_record_created

security:
  untrusted_inputs:
    - webpage_content
    - pdf_text
    - search_result_snippet
  protected_paths:
    - ".env"
    - ".env.*"
    - "**/secrets/**"
    - "published/**"
    - "distribution/**"
    - "archive/**"

migrations:
  - from_version: 0.0.0
    to_version: 0.1.0
    description: Install research monitoring source discovery, reliability assessment, cited digest generation, conflict triage, archive, and publish-gate contracts.
    steps:
      - Register monitored topics, source inventory, source assessment, citation ledger, and archive resources.
      - Require source freshness and contradiction checks before digest completion.
      - Require reliability assessments before claims can be treated as high confidence.
      - Require archive records when recurring digests update durable research memory.
      - Require approval before any digest is published or sent externally.

repo_templates:
  - id: literature-watch
    label: Literature Watch
    description: Track papers, preprints, and technical blogs for a recurring cited digest.
    required_signals:
      - source_inventory
      - retrieval_timestamps
      - citation_ledger
      - contradiction_notes
  - id: market-intel
    label: Market Intelligence
    description: Monitor competitor, customer, and pricing sources without publishing claims until reviewed.
    required_signals:
      - tracked_competitors
      - source_freshness
      - claim_confidence
      - publish_approval
  - id: policy-regulatory
    label: Policy And Regulatory Monitor
    description: Track regulatory updates, cite primary sources, and route risky claims through approval.
    required_signals:
      - primary_sources
      - jurisdiction
      - risk_classification
      - review_owner

gate_thresholds:
  scan:
    max_critical_blockers: 0
    max_major_blockers: 1
    minimum_evidence_completeness: 0.75
    minimum_report_quality: 0.7
  assess:
    max_critical_blockers: 0
    max_major_blockers: 1
    minimum_evidence_completeness: 0.85
    minimum_report_quality: 0.8
  digest:
    max_critical_blockers: 0
    max_major_blockers: 0
    minimum_evidence_completeness: 0.9
    minimum_report_quality: 0.85
  publish:
    max_critical_blockers: 0
    max_major_blockers: 0
    minimum_evidence_completeness: 0.95
    minimum_report_quality: 0.9
  archive:
    max_critical_blockers: 0
    max_major_blockers: 0
    minimum_evidence_completeness: 0.9
    minimum_report_quality: 0.85

report_sections:
  - id: source-coverage
    title: Source Coverage
    description: Monitored source inventory, discovery queries, freshness windows, retrieval timestamps, and source gaps.
    evidence_types:
      - source_inventory
      - source_discovery_log
      - source_freshness
      - retrieval_log
  - id: source-reliability
    title: Source Reliability
    description: Source authority, independence, recency, known bias, and primary-source status.
    evidence_types:
      - source_reliability_assessment
      - primary_source_review
      - independence_check
  - id: claim-quality
    title: Claim Quality
    description: Cited claims, uncited-claim checks, uncertainty markers, and contradiction reviews.
    evidence_types:
      - citation_ledger
      - contradiction_review
      - claim_confidence
  - id: distribution-readiness
    title: Distribution Readiness
    description: Publish approval, audience notes, redaction checks, and external-send policy status.
    evidence_types:
      - publish_approval
      - redaction_review
      - distribution_log
  - id: research-memory
    title: Research Memory
    description: Archive updates, durable source ids, claim ids, and follow-up questions for the next monitoring cycle.
    evidence_types:
      - archive_record
      - followup_question
      - durable_claim_id

eval_quality:
  minimum_score: 0.85
  required_contracts:
    - source_inventory_has_queries
    - sources_are_cited
    - source_freshness_checked
    - source_reliability_scored
    - publish_gate_requires_approval
    - archive_record_created
