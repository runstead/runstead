id: repo-maintenance
version: 0.1.0
name: Repository Maintenance
description: Keep software repositories healthy with governed AI workers.

compatibility:
  runstead_min_version: 0.0.0

scope:
  resource_types:
    - repository
    - branch
    - pull_request
    - workflow_run

goal_templates:
  - keep-ci-green

task_types:
  - repo_inspect
  - run_local_verifiers
  - ci_repair

default_policy: policies/repo-maintenance.yaml

default_verifiers:
  - command
  - git_diff_scope

required_tools:
  - filesystem
  - shell
  - git
  - github

supported_workers:
  - shell
  - claude_code
  - codex_cli
  - codex_direct

capability_policy:
  reads:
    - filesystem.repo
    - git.status
    - git.diff
    - github.workflow_run
  writes:
    - filesystem.patch
    - git.branch
    - github.pull_request_comment
  approvals_required:
    - dependency_install
    - protected_path_write
    - external_comment
  denied:
    - secret_read
    - production_infra_write

evidence_contracts:
  - workflow: keep-ci-green
    outputs:
      - repo_readiness
      - command_output
      - verifier_report
      - git_diff_scope
      - ci_repair_summary
    completion_criteria:
      - verifiers_pass_or_blockers_recorded
      - diff_scope_reviewed
      - protected_paths_untouched
      - audit_event_recorded

security:
  untrusted_inputs:
    - ci_log
    - github_issue_body
    - github_comment
  protected_paths:
    - ".env"
    - ".env.*"
    - "**/secrets/**"
    - "infra/prod/**"
