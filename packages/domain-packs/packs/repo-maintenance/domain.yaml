id: repo-maintenance
version: 0.1.0
name: Repository Maintenance
description: Keep software repositories healthy with governed AI workers.

scope:
  resource_types:
    - repository
    - branch
    - pull_request
    - workflow_run

goal_templates:
  - keep-ci-green

task_types:
  - repo_inspect
  - run_local_verifiers

default_policy: policies/repo-maintenance.yaml

default_verifiers:
  - command
  - git_diff_scope

required_tools:
  - filesystem
  - shell
  - git

supported_workers:
  - shell

security:
  untrusted_inputs:
    - ci_log
    - github_issue_body
    - github_comment
  protected_paths:
    - ".env"
    - ".env.*"
    - "**/secrets/**"
    - "infra/prod/**"
