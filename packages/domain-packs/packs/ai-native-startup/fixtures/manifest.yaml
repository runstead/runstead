version: 1
fixtures:
  - id: tiny-todo
    description: Minimal todo MVP fixture for a fast init, repo readiness, and verifier smoke path.
    path: tiny-todo
    task_type: run_mvp_verifiers
    goal_template: build-mvp
    tags:
      - reference
      - tiny
      - mvp
    acceptance_contracts:
      - tiny_todo_verifiers_pass
      - minimal_ci_detected
      - repo_readiness_inspected
  - id: validation-ledger-smoke
    description: Minimal idea-stage validation fixture for hypothesis ledger, customer evidence, disconfirming evidence, and MVP build gate.
    path: validation-ledger-smoke
    task_type: run_build_gate
    goal_template: validate-problem
    tags:
      - smoke
      - idea
      - validation
    acceptance_contracts:
      - problem_hypothesis_recorded
      - user_hypothesis_recorded
      - solution_hypothesis_recorded
      - validation_evidence_attached
      - disconfirming_evidence_checked
      - build_gate_passed
  - id: ai-coded-mvp-smoke
    description: Minimal AI-coded MVP fixture for startup context, measurement, readiness, and verifier evidence.
    path: ai-coded-mvp-smoke
    task_type: run_mvp_verifiers
    goal_template: build-mvp
    tags:
      - smoke
      - mvp
      - startup
    acceptance_contracts:
      - agent_context_generated
