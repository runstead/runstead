id: classify_followup_need
domain: email-followup
description: Classify candidate threads by follow-up reason, urgency, and risk.

default_priority: medium
max_attempts: 1

verifiers:
  required:
    - thread:followup_reason_recorded
    - thread:priority_assigned
    - thread:risk_flags_recorded

worker_routing:
  preferred: shell
  fallback:
    - codex_cli
