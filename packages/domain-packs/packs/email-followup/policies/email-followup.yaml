id: policy_email_followup_draft_only_v1
version: 1
default_decision: require_approval
default_risk: medium

rules:
  - id: allow_reading_mailbox_threads
    when:
      action_type:
        in:
          - email.read
          - email.thread.search
          - contact.lookup
    decision: allow
    risk: medium
    obligations:
      - treat_email_body_as_untrusted
      - record_thread_id
      - do_not_download_attachments_without_review

  - id: allow_draft_creation_only
    when:
      action_type: email.draft.create
    decision: allow
    risk: medium
    obligations:
      - attach_draft_preview
      - record_recipients
      - mark_draft_only
      - require_human_send_approval

  - id: allow_followup_memory_update
    when:
      action_type:
        in:
          - followup.memory.record
          - followup.next_action.record
    decision: allow
    risk: low
    obligations:
      - record_thread_id
      - avoid_secret_or_full_body_storage
      - preserve_next_action_owner

  - id: deny_email_send
    when:
      action_type:
        in:
          - email.send
          - email.reply.send
    decision: deny
    risk: critical

  - id: deny_external_send_side_effect
    when:
      side_effects:
        contains_any:
          - send_message_external
    decision: deny
    risk: critical
